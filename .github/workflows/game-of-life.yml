name: generate game-of-life contribution grid

on:
  schedule:
    - cron: "0 0 * * *"   # once a day, midnight UTC
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Debug life_grid.py
        run: |
          pwd
          find . -name "life_grid.py"
          echo "------ First 250 lines ------"
          nl -ba life_grid.py | sed -n '210,235p'
      

      - name: generate SVGs
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python3 life_grid.py

      - name: push to output branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "update game of life contribution grid"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:output
